name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
    - uses: actions/checkout@v7
    - uses: coursier/cache-action@v8
    - name: Compile
      run: |
        ./mill dataClass._.test.testForked
        ./mill test.testProjV1._.compile
        ./mill test.testProjV2._.compile
        ./mill test.userProjV1._.compile

  mima:
    runs-on: ubuntu-latest
    name: Binary compatibility
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: coursier/cache-action@v8
    - name: Check binary compatibility
      run: ./mill __.mimaReportBinaryIssues

  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: coursier/cache-action@v8
    - uses: coursier/setup-action@v3.0.0
      with:
        apps: scalafmt
    - name: Check formatting
      run: scalafmt --test

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true
    - uses: coursier/cache-action@v8
    - name: Release
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          ./mill -i mill.scalalib.SonatypeCentralPublishModule/ --bundleName "data-class-${GITHUB_REF#refs/tags/v}"
        else
          for tag in $(git tag --points-at HEAD); do
            git tag -d "$tag"
          done
          ./mill -i mill.scalalib.SonatypeCentralPublishModule/
        fi
      env:
        MILL_PGP_SECRET_BASE64: ${{ secrets.PUBLISH_SECRET_KEY }}
        MILL_PGP_PASSPHRASE: ${{ secrets.PUBLISH_SECRET_KEY_PASSWORD }}
        MILL_SONATYPE_USERNAME: ${{ secrets.PUBLISH_USER }}
        MILL_SONATYPE_PASSWORD: ${{ secrets.PUBLISH_PASSWORD }}
